name: 'integration test'
on: [push, pull_request, workflow_dispatch]
jobs:
  run-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: socks5
            target: run-container-test-socks5
          - name: basic
            target: run-container-test-basic
          - name: apiclient
            target: run-container-test-apiclient
          - name: apiserver
            target: run-container-test-apiserver
          - name: dialer
            target: run-container-test-dialer
          - name: egress
            target: run-container-test-egress
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run integration test
        run: make ${{ matrix.target }}
