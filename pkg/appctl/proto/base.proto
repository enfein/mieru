syntax = "proto3";

package mieru.appctl;

option go_package = "github.com/enfein/mieru/v3/pkg/appctl/appctlpb";

message AppStatusMsg {
    optional AppStatus status = 1;
}

enum AppStatus {
    UNKNOWN = 0;

    // RPC service is available, but proxy is not started.
    IDLE = 1;

    // Proxy is starting.
    STARTING = 2;

    // Proxy is running.
    RUNNING = 3;

    // Proxy is being stopped.
    STOPPING = 4;
}

enum LoggingLevel {
    DEFAULT = 0;
    FATAL = 1;
    ERROR = 2;
    WARN = 3;
    INFO = 4;
    DEBUG = 5;
    TRACE = 6;
}

enum DualStack {
    USE_FIRST_IP = 0;
    PREFER_IPv4 = 1;
    PREFER_IPv6 = 2;
    ONLY_IPv4 = 3;
    ONLY_IPv6 = 4;
}

message PortBinding {
    // A single port number.
    // This field can't be set with portRange at the same time.
    optional int32 port = 1;

    optional TransportProtocol protocol = 2;

    // A port number range.
    // For example, "8000-9000" contains 1001 ports from 8000 to 9000.
    // This field can't be set with port at the same time.
    optional string portRange = 3;
}

enum TransportProtocol {
    UNKNOWN_TRANSPORT_PROTOCOL = 0;
    UDP = 1;
    TCP = 2;
}

message User {

    // User name is also the ID of user.
    // Typically this is an email address.
    optional string name = 1;

    // Raw password.
    // For safety this shouldn't be persisted at the server side.
    optional string password = 2;

    // Hashed password.
    // Stored with hex encoding.
    optional string hashedPassword = 3;

    // User quotas.
    // This field has no effect at the client side.
    repeated Quota quotas = 4;

    // Allow user to use private IP as the destination.
    // This field has no effect at the client side.
    optional bool allowPrivateIP = 5;

    // Allow user to use loopback IP as the destination.
    // This field has no effect at the client side.
    optional bool allowLoopbackIP = 6;
}

message Quota {

    // Number of days to renew the quota.
    // The renew is rolling based.
    optional int32 days = 1;

    // Number of megabytes the user allowed to send and receive.
    optional int32 megabytes = 2;
}

message Auth {

    // Username used for authentication.
    optional string user = 1;

    // Password used for authentication.
    optional string password = 2;
}

message TrafficPattern {

    // Generate stable implicit traffic patterns that are not explictly set.
    // Generated traffic patterns are also influenced by "unlockAll" below.
    optional int32 seed = 1;

    // If true, implicit traffic patterns can use all possible options,
    // which may not be desired. Otherwise, implicit traffic patterns
    // only use limited options.
    // All explicitly set traffic patterns are available regardless of this.
    optional bool unlockAll = 2;

    // Split TCP packets by fragmentation.
    optional TCPFragment tcpFragment = 3;

    // Manipulate nonce prefix.
    optional NoncePattern nonce = 4;
}

message TCPFragment {

    // Enable additional TCP fragmentation.
    optional bool enable = 1;

    // Max sleep time in milliseconds between sending two fragments.
    // This value can't exceed 100.
    // If not set, a reasonable default value is used.
    optional int32 maxSleepMs = 2;
}

message NoncePattern {

    // Strategy to manipulate nonce.
    optional NonceType type = 1;

    // If the pattern applies to each UDP packet,
    // or only applies to the first UDP packet.
    optional bool applyToAllUDPPacket = 2;

    // Minimum number of bytes to manipulate.
    // It is ignored when NonceType is NONCE_TYPE_RANDOM or NONCE_TYPE_FIXED.
    optional int32 minLen = 3;

    // Maximum number of bytes to manipulate.
    // This value can't exceed 12.
    // It is ignored when NonceType is NONCE_TYPE_RANDOM or NONCE_TYPE_FIXED.
    optional int32 maxLen = 4;

    // A list of hex string (without 0x) that represent customized
    // nonce prefix to use. For example, string "00010203"
    // represent a 4 bytes nonce prefix [0, 1, 2, 3].
    //
    // Each nonce prefix can't exceed 12 bytes.
    //
    // When multiple strings are provided, a random one is used each time.
    //
    // It has no effect when NonceType is not NONCE_TYPE_FIXED.
    repeated string customHexStrings = 5;
}

enum NonceType {

    // Do not make change to the original random nonce.
    NONCE_TYPE_RANDOM = 0;

    // Use printable ASCII characters from 0x20 to 0x7E.
    NONCE_TYPE_PRINTABLE = 1;

    // Use a pre-defined subset of printable ASCII characters.
    NONCE_TYPE_PRINTABLE_SUBSET = 2;

    // Use a customized nonce prefix.
    // If field customHexStrings is not set in NoncePattern,
    // the behavior is the same as NONCE_TYPE_RANDOM.
    NONCE_TYPE_FIXED = 3;
}

// EncryptionType selects the encryption scheme used on top of the
// mieru protocol. The default (XCHACHA20_POLY1305) preserves existing
// behaviour: three rotating 32-byte keys derived from the shared
// password via PBKDF2 drive an XChaCha20-Poly1305 AEAD. NOISE switches
// the session to a full Noise Protocol Framework handshake whose
// parameters are described by NoiseConfig.
//
// The two modes are mutually exclusive for a given connection. A server
// may accept both modes simultaneously by listening on different port
// bindings or by enabling the client-signalled negotiation bit (see
// docs/noise.md).
enum EncryptionType {

    // Default password-based XChaCha20-Poly1305 (see docs/protocol.md).
    ENCRYPTION_TYPE_UNSPECIFIED = 0;

    // Default password-based XChaCha20-Poly1305 (see docs/protocol.md).
    XCHACHA20_POLY1305 = 1;

    // Noise Protocol Framework handshake + AEAD transport phase.
    // Configured via NoiseConfig.
    NOISE = 2;
}

// NoisePattern enumerates the Noise handshake patterns supported by
// mieru. Names follow the Noise specification
// (https://noiseprotocol.org/noise.html#handshake-patterns). Callers
// that do not care about the specific pattern should pick NOISE_XX:
// it provides mutual authentication, forward secrecy and does not
// require the client to know the server static key in advance.
enum NoisePattern {
    NOISE_PATTERN_UNSPECIFIED = 0;

    NOISE_NN = 1;  // Unauthenticated, 1-RTT. Suitable for testing only.
    NOISE_NK = 2;  // Server authenticated, 0-RTT. Client knows server static key.
    NOISE_NX = 3;  // Server authenticated, 1-RTT. Server transmits static key.
    NOISE_XN = 4;  // Client authenticated, 1.5-RTT. Client transmits static key.
    NOISE_XK = 5;  // Mutual authentication, 1-RTT. Client knows server static key.
    NOISE_XX = 6;  // Mutual authentication, 1.5-RTT. Recommended default.
    NOISE_IN = 7;  // Client authenticated immediately, 1-RTT.
    NOISE_IK = 8;  // Mutual authentication, 1-RTT. Client knows server static key.
    NOISE_IX = 9;  // Mutual authentication, 1-RTT. Client transmits static key first.
    NOISE_K  = 10; // One-way, both static keys known in advance.
    NOISE_N  = 11; // One-way, client only needs server static key.
    NOISE_X  = 12; // One-way, client transmits static key.
}

// NoiseDH selects the Diffie-Hellman function used in the handshake.
enum NoiseDH {
    NOISE_DH_UNSPECIFIED = 0;
    NOISE_DH_25519       = 1; // Curve25519 (X25519).
}

// NoiseCipher selects the AEAD cipher used for the transport phase.
enum NoiseCipher {
    NOISE_CIPHER_UNSPECIFIED    = 0;
    NOISE_CIPHER_CHACHA20POLY1305 = 1; // ChaCha20-Poly1305.
    NOISE_CIPHER_AES256GCM        = 2; // AES-256-GCM.
}

// NoiseHash selects the hash function used inside the handshake.
enum NoiseHash {
    NOISE_HASH_UNSPECIFIED = 0;
    NOISE_HASH_SHA256      = 1;
    NOISE_HASH_SHA512      = 2;
    NOISE_HASH_BLAKE2S     = 3;
    NOISE_HASH_BLAKE2B     = 4;
}

// NoiseConfig fully describes a Noise session.
//
// When EncryptionType is NOISE, NoiseConfig must be present and valid.
// Unset fields fall back to sane defaults documented in docs/noise.md:
// pattern = NOISE_XX, DH = NOISE_DH_25519, cipher =
// NOISE_CIPHER_CHACHA20POLY1305, hash = NOISE_HASH_SHA256.
message NoiseConfig {

    // Handshake pattern. Defaults to NOISE_XX.
    optional NoisePattern pattern = 1;

    // Diffie-Hellman function. Defaults to NOISE_DH_25519.
    optional NoiseDH dh = 2;

    // AEAD cipher. Defaults to NOISE_CIPHER_CHACHA20POLY1305.
    optional NoiseCipher cipher = 3;

    // Hash function. Defaults to NOISE_HASH_SHA256.
    optional NoiseHash hash = 4;

    // Local static private key, hex-encoded (no 0x prefix).
    // Required when the selected pattern + role combination contains
    // a local static token. Must decode to 32 bytes for NOISE_DH_25519.
    optional string localStaticPrivateKey = 5;

    // Local static public key, hex-encoded.
    // Must be the DH-derived public of localStaticPrivateKey. If empty
    // and a private key is present, mieru will derive the public key.
    optional string localStaticPublicKey = 6;

    // Remote static public key, hex-encoded.
    // Required for patterns where the initiator must already know the
    // responder's static key (NK, XK, IK, K, N, X). Unused otherwise.
    optional string remoteStaticPublicKey = 7;

    // Optional 32-byte pre-shared key, hex-encoded.
    // When set, the pattern is treated as its "psk"-modified variant
    // and presharedKeyPlacement selects the token position. Leave empty
    // to use the plain (non-PSK) pattern.
    optional string presharedKey = 8;

    // Position of the PSK token in the pattern (0-based).
    // Ignored when presharedKey is empty. For example, presharedKey
    // combined with placement = 3 selects XXpsk3 when pattern is NOISE_XX.
    optional int32 presharedKeyPlacement = 9;

    // Optional prologue bytes, hex-encoded. Both sides must supply the
    // same prologue. When empty, mieru uses the protocol version string
    // as an implicit prologue to prevent cross-version confusion.
    optional string prologue = 10;
}
